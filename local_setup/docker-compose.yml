# =============================================================================
# Kallabot v2 — Docker Compose
#
# By default the app uses DATABASE_URL from ../.env.
# The bundled postgres service is optional and only starts when the
# `local-db` profile is enabled.
#
# Start:  docker compose up -d
# Logs:   docker compose logs -f app
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    profiles: ["local-db"]
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kallabot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kallabot}
      POSTGRES_DB: ${POSTGRES_DB:-kallabot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kallabot} -d ${POSTGRES_DB:-kallabot}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..                               # project root (bolna/)
      dockerfile: local_setup/dockerfiles/Dockerfile
    restart: always
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------

volumes:
  postgres_data:
  redis_data:
