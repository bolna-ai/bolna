name: Auto Version Bump

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: v
        run: |
          CURRENT=$(grep -oP '(?<=__version__ = ")[^"]+' bolna/__init__.py)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          HIGHEST=$(printf '%s\n%s\n' "$CURRENT" "$LATEST_TAG" | sort -V | tail -1)
          if [ "$CURRENT" = "$HIGHEST" ] && [ "$CURRENT" != "$LATEST_TAG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<<"$LATEST_TAG"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "next=$MAJOR.$MINOR.$((PATCH + 1))" >> "$GITHUB_OUTPUT"

      - name: Apply bump
        if: steps.v.outputs.skip == 'false'
        env:
          NEXT: ${{ steps.v.outputs.next }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s/^__version__ = \".*\"/__version__ = \"$NEXT\"/" bolna/__init__.py
          sed -i "s/^version = \".*\"/version = \"$NEXT\"/" pyproject.toml
          git add bolna/__init__.py pyproject.toml
          git commit -m "bump: version $NEXT"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
